<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.0/gsap.min.js"></script>
    <title>Exam Revision Page</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        nav {
            background-color: #333333;
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.5);
        }

        nav a {
            color: #ffffff;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #4CAF50;
        }

        main {
            margin-top: 6rem;
        }

        section {
            background-color: #2b2b2b;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        section h2 {
            color: #ffffff;
        }

        section h3 {
            color: #888888;
        }

        section a {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            background-color: #4CAF50;
            color: #ffffff;
            border-radius: 5px;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        section a:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <nav>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <a href="#" class="text-xl font-semibold text-white">Exam Revision</a>
                    </div>
                    <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                        <a href="biss/index.html" class="text-white inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Business Information Security Systems</a>
                        <a href="eh/index.html" class="text-gray-300 hover:text-white hover:border-gray-300 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Ethical Hacking</a>
                        <a href="sc/index.html" class="text-gray-300 hover:text-white hover:border-gray-300 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Security Cryptography</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <section id="BIS">
                <div class="bg-gray-800 overflow-hidden shadow-sm sm:rounded-lg">
                    <div class="p-6 bg-gray-800 border-b border-gray-700">
                        <h2 class="text-2xl font-bold">Business Information Security Systems</h2>
                        <h3 class="text-md font-medium text-gray-400">Weekly Guide</h3>
                        <a href="biss/index.html" class="mt-4 bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded block text-center">
                            Go to Course Page
                        </a>
                    </div>
                </div>
            </section>
            <section id="EH">
                <div class="bg-gray-800 overflow-hidden shadow-sm sm:rounded-lg">
                    <div class="p-6 bg-gray-800 border-b border-gray-700">
                        <h2 class="text-2xl font-bold">Ethical Hacking</h2>
                        <h3 class="text-md font-medium text-gray-400">Weekly Guide</h3>
                        <a href="eh/index.html" class="mt-4 bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded block text-center">
                            Go to Course Page
                        </a>
                    </div>
                </div>
            </section>
            <section id="SC">
                <div class="bg-gray-800 overflow-hidden shadow-sm sm:rounded-lg">
                    <div class="p-6 bg-gray-800 border-b border-gray-700">
                        <h2 class="text-2xl font-bold">Security & Cryptography</h2>
                        <h3 class="text-md font-medium text-gray-400">Weekly Guide</h3>
                        <a href="sc/index.html" class="mt-4 bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded block text-center">
                            Go to Course Page
                        </a>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        function goToSection(sectionId) {
            gsap.to(window, { duration: 1, scrollTo: sectionId, ease: "power2.inOut" });
        }

        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', function (e) {
                e.preventDefault();
                const sectionId = this.getAttribute('href');
                goToSection(sectionId);
            });
        });
    </script>
</body>
</html>
